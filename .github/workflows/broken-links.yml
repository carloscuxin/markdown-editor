name: Check Broken Links

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 8am UTC
  workflow_dispatch:       # Allow manual runs

jobs:
  check-links:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Build with strict mode
        run: mkdocs build --strict
        continue-on-error: true
        id: build
      
      - name: Create issue if broken links found
        if: steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Broken links detected in documentation',
              body: [
                '## Broken Links Report',
                '',
                'The weekly documentation build detected broken links.',
                '',
                `Please run \`mkdocs build --strict\` locally to identify and fix the issues.`,
                '',
                `Build log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join('\n'),
              labels: ['documentation']
            });