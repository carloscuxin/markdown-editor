name: Documentation PR Notification

on:
  pull_request:
    paths: ['docs/**']
    types: [opened, synchronize]

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Add documentation label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['documentation']
            });

      - name: List changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: docs/**

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        with:
          script: |
            const files = process.env.CHANGED_FILES || '';
            const fileList = files.split(' ').filter(Boolean).map(f => `- \`${f}\``).join('\n');

            if (!fileList) return;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📝 Documentation Changes\n\nThe following documentation files were modified:\n\n${fileList}\n\nPlease review for accuracy and completeness.`
            });