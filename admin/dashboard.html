<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Páginas</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="../assets/css/wiki.css" />
</head>
<body>
  <header class="app-header">
    <h1>Documentación</h1>
    <div class="user-info" id="user-info"></div>
  </header>

  <div class="dashboard-layout">
    <aside class="dashboard-sidebar">
      <div class="tree-header">
        <h3>Page Tree</h3>
        <button class="btn btn-sm" onclick="Pages.loadTree()" title="Refrescar">↻</button>
      </div>
      <div id="tree-container" class="tree-container">
        <div class="loading">Cargando árbol...</div>
      </div>
    </aside>

    <main class="dashboard-main">
      <div class="dashboard-tabs">
        <button class="dtab active" data-tab="admin">Administraci&oacute;n</button>
        <button class="dtab" data-tab="wiki">Documentaci&oacute;n</button>
      </div>

      <div class="dashboard-header">
        <h2>Páginas</h2>
        <div style="display:flex;gap:6px">
          <a href="editor.html" class="btn btn-primary">+ Nueva página</a>
          <button class="btn btn-sm" onclick="Pages.regenerateIndex().then(() => Pages.showToast('Index regenerado', 'success'))" title="Regenerar wiki/index.html">&#8635; Index</button>
          <a href="../wiki/index.html" class="btn btn-sm" target="_blank" title="Ver wiki publicada">Ver wiki</a>
        </div>
      </div>

      <div id="empty-state" class="empty-state" style="display:none">
        <p>No hay páginas todavía. Crea la primera.</p>
      </div>

      <div id="pages-list"></div>

      <div id="wiki-panel" style="display:none">
        <div class="wiki-panel-content" id="wiki-panel-content"></div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages.js"></script>
  <script>
    (async () => {
      const user = await Auth.validateToken()
      if (!user) { window.location.href = 'login.html'; return }

      const info = document.getElementById('user-info')
      info.innerHTML = `
        <span>${user.login}</span>
        <img src="${user.avatar_url}" alt="" />
        <button class="btn btn-sm" onclick="Auth.logout()">Cerrar sesión</button>
      `

      await Pages.loadDashboard()
      await Pages.loadTree()
    })()
  </script>
</body>
</html>
