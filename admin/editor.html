<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Editor</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/2.5.4/toastui-editor.min.css" />
</head>
<body>
  <header class="app-header">
    <h1>Documentación</h1>
    <div class="user-info" id="user-info"></div>
  </header>

  <div class="editor-section">
    <div class="editor-header">
      <h2 id="page-title">Editor</h2>
      <a href="dashboard.html" class="btn">← Volver</a>
    </div>

    <div id="title-field" style="display:none">
      <input type="text" id="title-input" placeholder="Título de la página" />
    </div>

    <div id="editor-container"></div>

    <div class="editor-actions">
      <button class="btn btn-primary" onclick="Pages.savePage()">Guardar</button>
      <button class="btn" onclick="Pages.previewMermaid()">Vista previa Mermaid</button>
      <span id="editor-status" class="editor-status"></span>
      <a href="dashboard.html" class="btn">Cancelar</a>
    </div>
  </div>

  <div id="mermaid-modal" class="modal-overlay" style="display:none" onclick="if(event.target===event.currentTarget)document.getElementById('mermaid-modal').style.display='none'">
    <div class="modal-content">
      <button class="modal-close" onclick="document.getElementById('mermaid-modal').style.display='none'">&times;</button>
      <h3>Vista previa Mermaid</h3>
      <div id="mermaid-container"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://uicdn.toast.com/editor/2.5.4/toastui-editor-all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown@7/dist/turndown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages.js"></script>
  <script>
    (async () => {
      const user = await Auth.validateToken()
      if (!user) { window.location.href = 'login.html'; return }

      const info = document.getElementById('user-info')
      info.innerHTML = `
        <span>${user.login}</span>
        <img src="${user.avatar_url}" alt="" />
        <button class="btn btn-sm" onclick="Auth.logout()">Cerrar sesión</button>
      `

      const isNew = !new URLSearchParams(window.location.search).get('file')
      document.getElementById('title-field').style.display = isNew ? 'block' : 'none'

      await Pages.loadEditor()

      window.addEventListener('beforeunload', (e) => {
        if (Pages._dirty) {
          e.preventDefault()
          e.returnValue = ''
        }
      })
    })()
  </script>
</body>
</html>
