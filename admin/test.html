<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="https://uicdn.toast.com/editor/2.5.4/toastui-editor.min.css" />
<style>#editor-container{max-width:960px;margin:24px auto}</style>
</head><body>
<div id="editor-container"></div>
<div id="result" style="max-width:960px;margin:0 auto;padding:12px;font:14px sans-serif"></div>
<script src="https://uicdn.toast.com/editor/2.5.4/toastui-editor-all.min.js"></script>
<script>
function test(label, opts) {
  const el = document.getElementById('editor-container')
  el.innerHTML = ''
  try {
    const e = new toastui.Editor({ el, ...opts })
    return 'OK'
  } catch (err) {
    return 'ERROR: ' + err.message
  }
}

const base = { initialEditType: 'wysiwyg', height: '600px' }
const r = document.getElementById('result')
let html = ''

// Test each group
html += '<b>group1</b> (heading,bold,italic,strike): ' + test('g1', { ...base, toolbarItems: [['heading','bold','italic','strike']] }) + '<br>'
html += '<b>group2</b> (hr,quote,code,codeblock): ' + test('g2', { ...base, toolbarItems: [['hr','quote','code','codeblock']] }) + '<br>'
html += '<b>group3</b> (ul,ol,task,indent,outdent): ' + test('g3', { ...base, toolbarItems: [['ul','ol','task','indent','outdent']] }) + '<br>'
html += '<b>group4</b> (table,image,link): ' + test('g4', { ...base, toolbarItems: [['table','image','link']] }) + '<br>'

r.innerHTML = html
</script>
</body></html>
