<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Editor - Documentación</title>
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <link rel="stylesheet" href="../stylesheets/admin.css" />
</head>
<body class="editor-page">
  <header class="editor-header">
    <div class="editor-header-left">
      <a href="../index.html" class="btn btn-sm">← Volver al sitio</a>
      <h1 id="page-title">Editor</h1>
    </div>
    <div class="editor-header-right">
      <span id="user-info"></span>
      <button class="btn btn-sm" onclick="Auth.logout()">Cerrar sesión</button>
    </div>
  </header>

  <div class="editor-toolbar-extra">
    <input type="text" id="doc-title" placeholder="Título del documento*" required />
    <select id="domain-select" required>
      <option value="">Dominio*</option>
      <option value="agile">Agile</option>
      <option value="technical">Technical</option>
      <option value="user-guides">User Guides</option>
    </select>
    <select id="nav-section-select" required>
      <option value="">Sección*</option>
    </select>
    <input type="text" id="new-nav-input" placeholder="Nueva sección..." style="display:none" />
    <select id="template-select">
      <option value="">Plantilla...</option>
      <option value="epic">Epic</option>
      <option value="user-story">User Story</option>
      <option value="brd">BRD</option>
      <option value="release-note">Release Note</option>
      <option value="adr">ADR</option>
      <option value="meeting-notes">Meeting Notes</option>
    </select>
    <button class="btn btn-sm" onclick="Editor.preview()">Preview</button>
    <button class="btn btn-primary" onclick="Editor.save()">Guardar</button>
    <span id="editor-status" class="editor-status"></span>
  </div>

  <div id="editor-container"></div>

  <div id="preview-modal" class="modal-overlay" style="display:none" onclick="if(event.target===event.currentTarget)this.style.display='none'">
    <div class="modal-content modal-large">
      <button class="modal-close" onclick="document.getElementById('preview-modal').style.display='none'">&times;</button>
      <h3>Vista previa</h3>
      <div id="preview-content" class="preview-content"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/editor.js"></script>
  <script>
    (async () => {
      const user = await Auth.validateToken()
      if (!user) { window.location.href = 'login.html'; return }

      document.getElementById('user-info').innerHTML = `
        <span>${user.login}</span>
        <img src="${user.avatar_url}" alt="" class="avatar" />
      `

      await Editor.init()

      window.addEventListener('beforeunload', (e) => {
        if (Editor._dirty) {
          e.preventDefault()
          e.returnValue = ''
        }
      })
    })()
  </script>
</body>
</html>
